<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>B2 Deutsch-Akademie</title>
    <style>
        :root { --de-red: #d9534f; --de-gold: #ffcc00; --de-black: #212529; }
        body { font-family: 'Segoe UI', sans-serif; background-color: #f4f4f9; margin: 0; color: #333; }
        nav { background: var(--de-black); padding: 1rem; text-align: center; position: sticky; top: 0; z-index: 1000; }
        nav a { color: white; margin: 0 15px; text-decoration: none; font-weight: bold; cursor: pointer; }
        .container { max-width: 900px; margin: 30px auto; padding: 0 20px; }
        .section { display: none; background: white; padding: 2rem; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .active { display: block; }
        
        /* Grid for Grammar Topics */
        .topics-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 10px; margin-bottom: 20px; }
        .topic-btn { background: #eee; border: none; padding: 10px; border-radius: 5px; cursor: pointer; font-weight: bold; }
        .topic-btn:hover { background: var(--de-gold); }
        
        .content-area { border-top: 3px solid var(--de-red); padding-top: 20px; text-align: left; }
        .hidden { display: none; }

        /* Quiz UI */
        .quiz-card { background: var(--de-black); color: white; padding: 40px; border-radius: 15px; text-align: center; margin: 20px 0; }
        .translation { color: var(--de-gold); margin-top: 15px; display: none; font-style: italic; }
        .show-answer .translation { display: block; }
        
        table { width: 100%; border-collapse: collapse; margin: 10px 0; font-size: 0.85rem; }
        th, td { border: 1px solid #ddd; padding: 8px; }
        th { background: #f8f8f8; }
    </style>
</head>
<body>

<nav>
    <a onclick="showSection('grammar')">B2 Grammatik</a>
    <a onclick="showSection('training')">Interaktives Training</a>
</nav>

<div class="container">
    <div id="grammar" class="section active">
        <h2>B2 Grammatik-Übersicht</h2>
        <div class="topics-grid">
            <button class="topic-btn" onclick="showTopic('passiv')">Passiv / Ersatz</button>
            <button class="topic-btn" onclick="showTopic('konjunkt')">Konjunktionen</button>
            <button class="topic-btn" onclick="showTopic('prepo')">Präpositionen</button>
            <button class="topic-btn" onclick="showTopic('konj2')">Konjunktiv I & II</button>
            <button class="topic-btn" onclick="showTopic('satz')">Satzbau (TeKaMoLo)</button>
            <button class="topic-btn" onclick="showTopic('relativ')">Relativsätze</button>
        </div>

        <div id="topic-display" class="content-area">
            <p>Wähle ein Thema oben aus, um die B2-Regeln anzuzeigen.</p>
        </div>
    </div>

    <div id="training" class="section">
        <h2>B2 Satz-Training</h2>
        <div class="quiz-card" id="quiz-box">
            <div id="de-text" style="font-size: 1.5rem;">Klicke auf Start!</div>
            <div id="en-text" class="translation"></div>
        </div>
        <div style="text-align: center;">
            <button class="topic-btn" onclick="document.getElementById('quiz-box').classList.toggle('show-answer')">Antwort zeigen</button>
            <button class="topic-btn" style="background:var(--de-red); color:white;" onclick="nextExercise()">Nächster Satz</button>
        </div>
    </div>
</div>

<script>
    const topics = {
        passiv: `<h3>Passiv & Ersatzformen</h3>
                 <p><b>Vorgangspassiv:</b> werden + Partizip II [cite: 7, 12]</p>
                 <p><b>Zustandspassiv:</b> sein + Partizip II [cite: 13, 18]</p>
                 <p><b>Ersatzformen:</b> sein + zu + Infinitiv / sich lassen + Infinitiv [cite: 22, 28]</p>`,
        konjunkt: `<h3>Konjunktionen & Konnektoren</h3>
                   <p><b>Zweiteilig:</b> weder...noch, sowohl...als auch, nicht nur...sondern auch, je...desto [cite: 68, 73, 76]</p>
                   <p><b>Kausalsätze:</b> weil, da, deshalb, aufgrund [cite: 105, 108]</p>`,
        prepo: `<h3>Präpositionen</h3>
                <p><b>Akkusativ:</b> bis, für, gegen, ohne, wider, um [cite: 39, 41]</p>
                <p><b>Dativ:</b> ab, aus, bei, nach, seit, von, zu [cite: 39, 42]</p>
                <p><b>Genitiv:</b> aufgrund, trotz, während, wegen [cite: 40, 43, 45]</p>`,
        konj2: `<h3>Konjunktiv I & II</h3>
                <p><b>Konjunktiv II (Wunsch):</b> hätte / wäre + Partizip II [cite: 185, 203]</p>
                <p><b>Konjunktiv I (Indirekte Rede):</b> er sei, er könne, er wolle [cite: 211, 212, 213]</p>`,
        satz: `<h3>Satzstellung (TeKaMoLo)</h3>
               <p>1. Temporal | 2. Kausal | 3. Modal | 4. Lokal [cite: 133, 134, 136, 139]</p>
               <p><b>Pronomen:</b> Akkusativ-Pronomen vor Dativ-Pronomen [cite: 142]</p>`,
        relativ: `<h3>Verkürzte Relativsätze</h3>
                  <p>Wer eine Frage hat, (der) kann sie stellen. [cite: 85, 86]</p>
                  <p><b>Partizip I:</b> die vorbeifahrenden Autos (aktiv) [cite: 93, 94, 99]</p>`
    };

    const exercises = [
        { de: "Der Vertrag wird heute unterschrieben.", note: "Passiv Präsens" },
        { de: "Der Vertrag ist heute unterschrieben worden.", note: "Passiv Perfekt" },
        { de: "Der Baum ist heute noch zu fällen.", note: "Passiversatz (sein zu)" },
        { de: "Je weniger ich schlafe, desto müder bin ich.", note: "Zweiteiliger Konnektor" },
        { de: "Er tut so, als ob er mich nicht hören könnte.", note: "Irrealer Vergleich" },
        { de: "Woran denkst du? - Ich denke an die Party.", note: "Präpositionaladverb" },
        { de: "Trotz seiner Arbeit kümmert er sich um den Haushalt.", note: "Konzessivsatz (Genitiv)" }
    ];

    function showSection(id) {
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    function showTopic(id) {
        document.getElementById('topic-display').innerHTML = topics[id];
    }

    function nextExercise() {
        const item = exercises[Math.floor(Math.random() * exercises.length)];
        document.getElementById('quiz-box').classList.remove('show-answer');
        document.getElementById('de-text').innerText = item.de;
        document.getElementById('en-text').innerText = "Kontext: " + item.note;
    }
</script>

</body>
</html>
