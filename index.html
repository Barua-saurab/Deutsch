<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DeutschLernen | Advanced Flashcards</title>
    <style>
        :root {
            --primary: #4a90e2;
            --secondary: #34495e;
            --bg: #f8f9fa;
            --text: #2d3436;
            --card-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { background-color: var(--bg); color: var(--text); line-height: 1.6; }

        /* Navigation */
        .navbar {
            display: flex; justify-content: space-between; align-items: center;
            padding: 1rem 10%; background: white; box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            position: sticky; top: 0; z-index: 100;
        }
        .logo { font-size: 1.5rem; font-weight: bold; }
        .logo span { color: var(--primary); }
        .nav-links { list-style: none; display: flex; gap: 2rem; }
        .nav-links li { cursor: pointer; font-weight: 500; }

        /* Layout */
        .container { max-width: 800px; margin: 2rem auto; padding: 0 1rem; text-align: center; }
        .content-section { display: none; animation: fadeIn 0.4s ease; }
        .content-section.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* Category Selection Grid */
        .category-grid {
            display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px;
            margin-bottom: 2rem;
        }
        .cat-btn {
            padding: 15px; border: 2px solid var(--primary); background: white;
            border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.3s;
        }
        .cat-btn:hover, .cat-btn.active { background: var(--primary); color: white; }

        /* Flashcards */
        .flashcard-container { perspective: 1000px; display: flex; flex-direction: column; align-items: center; }
        .flashcard { width: 320px; height: 220px; cursor: pointer; position: relative; transform-style: preserve-3d; transition: transform 0.6s; }
        .flashcard.flipped { transform: rotateY(180deg); }
        .card-front, .card-back { 
            position: absolute; width: 100%; height: 100%; backface-visibility: hidden; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            border-radius: 15px; box-shadow: var(--card-shadow); 
        }
        .card-front { background: white; border: 2px solid #eee; }
        .card-back { background: var(--primary); color: white; transform: rotateY(180deg); }
        .card-label { font-size: 0.8rem; text-transform: uppercase; margin-bottom: 10px; opacity: 0.7; }
        .word-text { font-size: 2rem; font-weight: bold; }

        .controls { margin-top: 20px; display: flex; gap: 15px; align-items: center; }
        .btn-nav { padding: 10px 20px; border: none; border-radius: 5px; background: var(--secondary); color: white; cursor: pointer; }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="logo">🇩🇪 Deutsch<span>Lernen</span></div>
        <ul class="nav-links">
            <li onclick="showSection('home')">Home</li>
            <li onclick="showSection('flashcards')">Flashcards</li>
        </ul>
    </nav>

    <div class="container">
        <section id="home" class="content-section active">
            <h1>Willkommen!</h1>
            <p>Select the Flashcard section to start drilling vocabulary by category.</p>
        </section>

        <section id="flashcards" class="content-section">
            <h2 style="margin-bottom: 1rem;">Choose a Category</h2>
            
            <div class="category-grid">
                <button class="cat-btn active" onclick="loadCategory(0, this)">1. Basics</button>
                <button class="cat-btn" onclick="loadCategory(1, this)">2. Family</button>
                <button class="cat-btn" onclick="loadCategory(2, this)">3. Food</button>
                <button class="cat-btn" onclick="loadCategory(3, this)">4. Verbs</button>
                <button class="cat-btn" onclick="loadCategory(4, this)">5. Colors</button>
                <button class="cat-btn" onclick="loadCategory(5, this)">6. Nature</button>
            </div>

            <div class="flashcard-container">
                <div class="flashcard" id="flashcard" onclick="this.classList.toggle('flipped')">
                    <div class="card-front">
                        <span class="card-label">German</span>
                        <span class="word-text" id="card-de">Hallo</span>
                    </div>
                    <div class="card-back">
                        <span class="card-label">English</span>
                        <span class="word-text" id="card-en">Hello</span>
                    </div>
                </div>
                <div class="controls">
                    <button class="btn-nav" onclick="prevCard()">←</button>
                    <span id="counter">1 / 3</span>
                    <button class="btn-nav" onclick="nextCard()">→</button>
                </div>
            </div>
        </section>
    </div>

    <script>
        // Data organized into 6 sections
        const decks = [
            [ {d:"Hallo", e:"Hello"}, {d:"Danke", e:"Thank you"}, {d:"Bitte", e:"Please"} ], // 1. Basics
            [ {d:"Mutter", e:"Mother"}, {d:"Vater", e:"Father"}, {d:"Bruder", e:"Brother"} ], // 2. Family
            [ {d:"Brot", e:"Bread"}, {d:"Apfel", e:"Apple"}, {d:"Käse", e:"Cheese"} ],      // 3. Food
            [ {d:"Laufen", e:"To run"}, {d:"Essen", e:"To eat"}, {d:"Schlafen", e:"To sleep"} ], // 4. Verbs
            [ {d:"Rot", e:"Red"}, {d:"Blau", e:"Blue"}, {d:"Grün", e:"Green"} ],           // 5. Colors
            [ {d:"Baum", e:"Tree"}, {d:"Blume", e:"Flower"}, {d:"Sonne", e:"Sun"} ]        // 6. Nature
        ];

        let currentDeckIndex = 0;
        let cardIndex = 0;

        function showSection(id) {
            document.querySelectorAll('.content-section').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        function loadCategory(index, btn) {
            // Update UI buttons
            document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');

            // Reset deck
            currentDeckIndex = index;
            cardIndex = 0;
            updateCard();
        }

        function updateCard() {
            const card = document.getElementById('flashcard');
            card.classList.remove('flipped'); // Reset flip state when changing card
            
            // Short delay to allow flip animation to reset before changing text
            setTimeout(() => {
                const deck = decks[currentDeckIndex];
                document.getElementById('card-de').innerText = deck[cardIndex].d;
                document.getElementById('card-en').innerText = deck[cardIndex].e;
                document.getElementById('counter').innerText = `${cardIndex + 1} / ${deck.length}`;
            }, 150);
        }

        function nextCard() {
            const deck = decks[currentDeckIndex];
            cardIndex = (cardIndex + 1) % deck.length;
            updateCard();
        }

        function prevCard() {
            const deck = decks[currentDeckIndex];
            cardIndex = (cardIndex - 1 + deck.length) % deck.length;
            updateCard();
        }

        // Initialize first card
        updateCard();
    </script>
</body>
</html>
