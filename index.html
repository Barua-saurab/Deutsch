<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DeutschLernen | Flashcard Ranges</title>
    
    <style>
        /* =========================================
           1. CSS STYLES
           ========================================= */
        :root {
            --primary: #4a90e2;
            --secondary: #34495e;
            --success: #2ecc71;
            --error: #e74c3c;
            --bg: #f8f9fa;
            --text: #2d3436;
            --card-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { background-color: var(--bg); color: var(--text); line-height: 1.6; }

        .navbar {
            display: flex; justify-content: space-between; align-items: center;
            padding: 1rem 10%; background: white; box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            position: sticky; top: 0; z-index: 100;
        }
        .logo { font-size: 1.5rem; font-weight: bold; }
        .logo span { color: var(--primary); }
        .nav-links { list-style: none; display: flex; gap: 2rem; }
        .nav-links li { cursor: pointer; font-weight: 500; color: var(--secondary); }

        .container { max-width: 800px; margin: 2rem auto; padding: 0 1rem; }
        .content-section { display: none; animation: fadeIn 0.4s ease; }
        .content-section.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* Range Tiles Styles */
        .range-container { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 2rem; justify-content: center; }
        .range-tile { 
            background: white; border: 2px solid var(--secondary); color: var(--secondary);
            padding: 10px 15px; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.3s;
        }
        .range-tile.active { background: var(--secondary); color: white; }

        /* Flashcard Components */
        .flashcard-container { perspective: 1000px; display: flex; flex-direction: column; align-items: center; }
        .flashcard { width: 320px; height: 220px; cursor: pointer; position: relative; transform-style: preserve-3d; transition: transform 0.6s; }
        .flashcard.flipped { transform: rotateY(180deg); }
        .card-front, .card-back { 
            position: absolute; width: 100%; height: 100%; backface-visibility: hidden; 
            display: flex; align-items: center; justify-content: center; 
            font-size: 2rem; border-radius: 15px; box-shadow: var(--card-shadow); 
        }
        .card-front { background: white; border: 1px solid #ddd; }
        .card-back { background: var(--primary); color: white; transform: rotateY(180deg); }
        .controls { margin-top: 20px; display: flex; gap: 15px; align-items: center; }
        .option-btn { padding: 10px 20px; border: 1px solid #ddd; border-radius: 8px; cursor: pointer; background: white; }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="logo">🇩🇪 Deutsch<span>Lernen</span></div>
        <ul class="nav-links">
            <li onclick="showSection('home')">Home</li>
            <li onclick="showSection('flashcards')">Flashcards</li>
        </ul>
    </nav>

    <div class="container">
        <section id="home" class="content-section active">
            <div style="text-align: center; padding: 2rem;">
                <h1>Welcome back!</h1>
                <p>Click "Flashcards" in the menu to start your vocabulary training.</p>
            </div>
        </section>

        <section id="flashcards" class="content-section">
            <h2 style="margin-bottom: 1rem; text-align: center;">Vocabulary Ranges</h2>
            
            <div class="range-container">
                <button class="range-tile active" onclick="setRange(1, 50, this)">1 - 50</button>
                <button class="range-tile" onclick="setRange(51, 100, this)">51 - 100</button>
                <button class="range-tile" onclick="setRange(101, 150, this)">101 - 150</button>
                <button class="range-tile" onclick="setRange(151, 200, this)">151 - 200</button>
            </div>

            <div class="flashcard-container">
                <div class="flashcard" id="flashcard" onclick="this.classList.toggle('flipped')">
                    <div class="card-front" id="card-de">German</div>
                    <div class="card-back" id="card-en">English</div>
                </div>
                <div class="controls">
                    <button class="option-btn" onclick="prevCard()">←</button>
                    <span id="counter">1 / 0</span>
                    <button class="option-btn" onclick="nextCard()">→</button>
                </div>
                <p style="margin-top: 1rem; color: #666; font-size: 0.9rem;">Click the card to flip!</p>
            </div>
        </section>
    </div>

    <script>
        /* =========================================
           2. DATA SECTION (EDIT/ADD HERE)
           ========================================= */

        // You can add up to 200 words here. 
        // The script will automatically filter them by their position in this list.
        const words = [
            // 1 - 50 Range
            {d:"Apfel", e:"Apple"}, {d:"Brot", e:"Bread"}, {d:"Wasser", e:"Water"}, 
            {d:"Milch", e:"Milk"}, {d:"Käse", e:"Cheese"}, 

            // 51 - 100 Range (Example words)
            // Note: I'm jumping ahead in the index for demo purposes
            ...Array(45).fill({d:"Word 6-50", e:"Placeholder"}),
            {d:"Flughafen", e:"Airport"}, {d:"Bahnhof", e:"Train Station"}, 
            
            // 101 - 200 Range
            ...Array(148).fill({d:"Advanced Word", e:"Placeholder"})
        ];

        /* =========================================
           3. LOGIC
           ========================================= */

        let filteredWords = [];
        let fIdx = 0;

        function showSection(id) {
            document.querySelectorAll('.content-section').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        // RANGE FILTER LOGIC
        function setRange(min, max, btnElement) {
            // Update button styles
            document.querySelectorAll('.range-tile').forEach(btn => btn.classList.remove('active'));
            btnElement.classList.add('active');

            // Filter the array based on index (1-based index for user friendliness)
            // slice(start, end) takes from start index up to (not including) end index
            filteredWords = words.slice(min - 1, max);

            // Reset card index
            fIdx = 0;
            updateCardDisplay();
        }

        function updateCardDisplay() {
            const card = document.getElementById('flashcard');
            card.classList.remove('flipped');

            if (filteredWords.length === 0) {
                document.getElementById('card-de').innerText = "Empty";
                document.getElementById('card-en').innerText = "No words in this range";
                document.getElementById('counter').innerText = "0 / 0";
                return;
            }

            // Small timeout so the card flips back before text changes
            setTimeout(() => {
                document.getElementById('card-de').innerText = filteredWords[fIdx].d;
                document.getElementById('card-en').innerText = filteredWords[fIdx].e;
                document.getElementById('counter').innerText = `${fIdx + 1} / ${filteredWords.length}`;
            }, 100);
        }

        function nextCard() {
            if (filteredWords.length === 0) return;
            fIdx = (fIdx + 1) % filteredWords.length;
            updateCardDisplay();
        }

        function prevCard() {
            if (filteredWords.length === 0) return;
            fIdx = (fIdx - 1 + filteredWords.length) % filteredWords.length;
            updateCardDisplay();
        }

        // Initialize with first range
        setRange(1, 50, document.querySelector('.range-tile'));
    </script>
</body>
</html>
