<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>B2 Deutsch-Mentor</title>
    <style>
        :root { --de-red: #d9534f; --de-gold: #ffcc00; --de-black: #212529; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background-color: #f8f9fa; margin: 0; color: #333; }
        
        nav { background: var(--de-black); padding: 1rem; text-align: center; position: sticky; top: 0; z-index: 1000; }
        nav a { color: white; margin: 0 15px; text-decoration: none; font-weight: bold; cursor: pointer; }
        
        .container { max-width: 900px; margin: 20px auto; padding: 0 20px; }
        .section { display: none; background: white; padding: 2rem; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .active { display: block; animation: fadeIn 0.3s ease-in; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .topics-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 10px; margin-bottom: 30px; }
        .topic-btn { background: #f8f9fa; border: 1px solid #ddd; padding: 12px; border-radius: 8px; cursor: pointer; font-weight: bold; text-align: left; }
        .topic-btn:hover { background: var(--de-gold); }
        
        .content-area { border-top: 5px solid var(--de-red); padding-top: 20px; line-height: 1.7; }
        .ex { background: #f1f3f5; padding: 10px; border-radius: 5px; margin: 10px 0; border-left: 4px solid #6c757d; }
        .en { color: #666; font-style: italic; font-size: 0.9rem; display: block; }
        code { background: #fff3f3; padding: 2px 6px; border-radius: 4px; color: #b52b27; font-weight: bold; }

        .quiz-card { background: var(--de-black); color: white; padding: 50px 20px; border-radius: 15px; text-align: center; margin-bottom: 20px; min-height: 160px; display: flex; flex-direction: column; justify-content: center; }
        .german-text { font-size: 1.6rem; font-weight: bold; margin-bottom: 10px; }
        .translation { color: var(--de-gold); font-size: 1.2rem; font-style: italic; display: none; padding-top: 15px; border-top: 1px solid #444; }
        .show-answer .translation { display: block; }
        
        .controls { display: flex; gap: 10px; justify-content: center; }
        .btn { border: none; padding: 15px 30px; border-radius: 10px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .btn-reveal { background: #6c757d; color: white; }
        .btn-next { background: var(--de-red); color: white; }
    </style>
</head>
<body>

<nav>
    <a onclick="showSection('grammar')">Grammatik-Referenz</a>
    <a onclick="showSection('training')">Satz-Training</a>
</nav>

<div class="container">
    <div id="grammar" class="section active">
        <h2>B2 Grammatik (Deutsch & English)</h2>
        <div class="topics-grid">
            <button class="topic-btn" onclick="renderTopic('passiv')">1-3. Passiv</button>
            <button class="topic-btn" onclick="renderTopic('ersatz')">4. Passiversatz</button>
            <button class="topic-btn" onclick="renderTopic('konj')">5. Konjunktionen</button>
            <button class="topic-btn" onclick="renderTopic('prep')">6-8. Präpositionen</button>
            <button class="topic-btn" onclick="renderTopic('konnekt')">9. Zweiteilige Konnektoren</button>
            <button class="topic-btn" onclick="renderTopic('partizip')">10-11. Partizipien</button>
            <button class="topic-btn" onclick="renderTopic('kausal')">12-16. Satzgefüge</button>
            <button class="topic-btn" onclick="renderTopic('tekamolo')">16. TeKaMoLo</button>
            <button class="topic-btn" onclick="renderTopic('infinitiv')">17-18. Infinitiv</button>
            <button class="topic-btn" onclick="renderTopic('k2')">19-20. Konjunktiv II</button>
            <button class="topic-btn" onclick="renderTopic('futur')">21-23. Futur & Relativ</button>
        </div>
        <div id="display" class="content-area">Wähle ein Thema aus.</div>
    </div>

    <div id="training" class="section">
        <h2>Vokabel & Grammatik Training</h2>
        <div class="quiz-card" id="quiz-box">
            <div id="q-de" class="german-text">Klicke auf Nächster Satz!</div>
            <div id="q-en" class="translation">Click Next to start!</div>
        </div>
        <div class="controls">
            <button class="btn btn-reveal" onclick="document.getElementById('quiz-box').classList.toggle('show-answer')">Anzeigen</button>
            <button class="btn btn-next" onclick="nextExercise()">Nächster Satz</button>
        </div>
    </div>
</div>

<script>
const grammarData = {
    passiv: `<h3>1-3. Passiv (Passive Voice)</h3>
        <p><b>Präsens:</b> <code>werden + Partizip II</code></p>
        <div class="ex">Der Vertrag wird unterschrieben.<span class="en">The contract is being signed.</span></div>
        <p><b>Präteritum:</b> <code>wurden + Partizip II</code></p>
        <div class="ex">Der Vertrag wurde unterschrieben.<span class="en">The contract was signed.</span></div>
        <p><b>Perfekt:</b> <code>sein + Partizip II + worden</code></p>
        <div class="ex">Der Vertrag ist unterschrieben worden.<span class="en">The contract has been signed.</span></div>`,
    
    ersatz: `<h3>4. Passiversatzformen (Alternatives)</h3>
        <p><b>sein + zu + Infinitiv:</b></p>
        <div class="ex">Der Baum ist zu fällen.<span class="en">The tree is to be felled (must be felled).</span></div>
        <p><b>sich lassen + Infinitiv:</b></p>
        <div class="ex">Das Problem lässt sich lösen.<span class="en">The problem can be solved.</span></div>`,

    konj: `<h3>5. Konjunktionen</h3>
        <p><b>Position 0 (Hauptsatz):</b> aber, denn, doch, oder, sondern, und</p>
        <div class="ex">Ich wollte kommen, aber ich hatte keine Zeit.<span class="en">I wanted to come, but I had no time.</span></div>
        <p><b>Nebensatz (Verb am Ende):</b> weil, wenn, als, falls, nachdem, sobald</p>
        <div class="ex">Ich bleibe zu Hause, weil ich krank bin.<span class="en">I'm staying home because I'm sick.</span></div>`,

    prep: `<h3>6-8. Präpositionen</h3>
        <p><b>Akkusativ:</b> bis, für, gegen, ohne, um, wider</p>
        <p><b>Dativ:</b> ab, aus, bei, mit, nach, seit, von, zu</p>
        <p><b>Genitiv:</b> aufgrund, trotz, während, wegen</p>
        <div class="ex">Wegen des Regens bleiben wir zu Hause.<span class="en">Because of the rain, we are staying home.</span></div>`,

    konnekt: `<h3>9. Zweiteilige Konnektoren (Two-part Connectors)</h3>
        <p>Diese Konnektoren verbinden zwei Satzteile oder Hauptsätze miteinander.</p>
        
        <div class="ex"><b>weder … noch …</b> (neither … nor …)
            <br>Ich verstehe weder Spanisch noch Portugiesisch.
            <span class="en">I understand neither Spanish nor Portuguese.</span>
        </div>

        <div class="ex"><b>sowohl … als auch …</b> (as well as / both … and …)
            <br>Sie hat sowohl Schwestern als auch Brüder.
            <span class="en">She has both sisters and brothers.</span>
        </div>

        <div class="ex"><b>nicht nur …, sondern auch …</b> (not only … but also …)
            <br>Er lernt nicht nur Deutsch, sondern er besucht auch einen Griechischkurs.
            <span class="en">He is not only learning German, but he is also attending a Greek course.</span>
        </div>

        <div class="ex"><b>teils … teils …</b> (partly … partly …)
            <br>Teils arbeitet er von zu Hause, teils im Büro in der Firma.
            <span class="en">Partly he works from home, partly in the company office.</span>
        </div>

        <div class="ex"><b>je …, desto …</b> (the [more] …, the [more] …)
            <br>Je weniger ich schlafe, desto müder bin ich am nächsten Tag.
            <span class="en">The less I sleep, the more tired I am the next day.</span>
        </div>

        <div class="ex"><b>zwar …, aber … / zwar … doch …</b> (it's true …, but …)
            <br>Zwar scheint heute die Sonne, doch es ist sehr kalt.
            <span class="en">It's true the sun is shining today, but it is very cold.</span>
        </div>

        <div class="ex"><b>einerseits … andererseits …</b> (on the one hand … on the other hand …)
            <br>Einerseits ist die Arbeit sehr spannend, andererseits bereitet sie mir auch oft Stress.
            <span class="en">On the one hand, the work is very exciting; on the other hand, it often causes me stress.</span>
        </div>

        <div class="ex"><b>entweder … oder …</b> (either … or …)
            <br>Entweder treffen wir uns im Café oder ich warte direkt am Bahnhof auf dich.
            <span class="en">Either we meet in the café, or I'll wait for you directly at the station.</span>
        </div>`,

    partizip: `<h3>10-11. Partizipien</h3>
        <p><b>Partizip I (Aktiv):</b> der fahrende Zug<span class="en">the moving train</span></p>
        <p><b>Partizip II (Passiv):</b> der geschriebene Brief<span class="en">the written letter</span></p>`,

    tekamolo: `<h3>16. TeKaMoLo Regel</h3>
        <p>Reihenfolge: <b>Te</b>mporal, <b>Ka</b>usal, <b>Mo</b>dal, <b>Lo</b>kal</p>
        <div class="ex">Ich fahre morgen (T) wegen der Arbeit (K) mit dem Bus (M) zur Uni (L).<span class="en">I'm taking the bus to uni tomorrow because of work.</span></div>`,

    k2: `<h3>19-20. Konjunktiv II (Subjunctive II)</h3>
        <p>Der Konjunktiv II wird für Wünsche, höfliche Bitten, Ratschläge und irreale Situationen verwendet.</p>
        
        <div class="ex"><b>Wunsch (Wish):</b>
            <br>Ich wäre gern Bundeskanzlerin von Deutschland.
            <span class="en">I would like to be the Federal Chancellor of Germany.</span>
        </div>

        <div class="ex"><b>Höfliche Bitte (Polite Request):</b>
            <br>Könnten Sie mir bitte meinen Text korrigieren?
            <span class="en">Could you please correct my text for me?</span>
        </div>

        <div class="ex"><b>Ratschlag (Advice):</b>
            <br>Du solltest dir einen Nebenjob suchen.
            <span class="en">You should look for a part-time job.</span>
        </div>

        <div class="ex"><b>Irreale Bedingung (Unreal Condition):</b>
            <br>Wenn ich reich wäre, würde ich viel reisen.
            <span class="en">If I were rich, I would travel a lot.</span>
        </div>

        <div class="ex"><b>Vergangenheit (Past Tense):</b>
            <br>Wenn ich mehr gelernt hätte, hätte ich die Prüfung bestanden.
            <span class="en">If I had studied more, I would have passed the exam.</span>
        </div>`,

    futur: `<h3>21-23. Futur I & II</h3>
        <p><b>Futur II (Vermutung):</b> <code>werden + Partizip II + haben/sein</code></p>
        <div class="ex">Er wird viel gearbeitet haben.<span class="en">He must have worked a lot (Assumption).</span></div>`
};

const exercises = [
    { de: "Der Vertrag wird unterschrieben.", en: "The contract is being signed. [Passiv Präsens]" },
    { de: "Das Problem ist gelöst worden.", en: "The problem has been solved. [Passiv Perfekt]" },
    { de: "Das Programm lässt sich installieren.", en: "The program can be installed. [Passiversatz]" },
    { de: "Weder Spanisch noch Portugiesisch.", en: "Neither Spanish nor Portuguese. [Konnektor]" },
    { de: "Trotz der Probleme arbeitet er weiter.", en: "Despite the problems, he continues to work. [Genitiv]" },
    { de: "Wenn ich reich wäre, würde ich reisen.", en: "If I were rich, I would travel. [Konjunktiv II]" },
    { de: "Er wird jetzt bestimmt schlafen.", en: "He is probably sleeping now. [Futur I Vermutung]" },
    { de: "Ich habe Zeit, Deutsch zu lernen.", en: "I have time to learn German. [Infinitiv mit zu]" }
];

function showSection(id) {
    document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
}

function renderTopic(id) {
    document.getElementById('display').innerHTML = grammarData[id] || "Inhalt folgt...";
}

function nextExercise() {
    const box = document.getElementById('quiz-box');
    const item = exercises[Math.floor(Math.random() * exercises.length)];
    box.classList.remove('show-answer');
    document.getElementById('q-de').innerText = item.de;
    document.getElementById('q-en').innerText = item.en;
}
</script>
</body>
</html>
