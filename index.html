<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DeutschLernen | Complete Platform</title>
    
    <style>
        /* =========================================
           1. CSS STYLES (Global & Layout)
           ========================================= */
        :root {
            --primary: #4a90e2;
            --secondary: #34495e;
            --success: #2ecc71;
            --error: #e74c3c;
            --bg: #f8f9fa;
            --text: #2d3436;
            --card-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { background-color: var(--bg); color: var(--text); line-height: 1.6; }

        /* Navigation Bar */
        .navbar {
            display: flex; justify-content: space-between; align-items: center;
            padding: 1rem 10%; background: white; box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            position: sticky; top: 0; z-index: 100;
        }
        .logo { font-size: 1.5rem; font-weight: bold; }
        .logo span { color: var(--primary); }
        .nav-links { list-style: none; display: flex; gap: 2rem; }
        .nav-links li { cursor: pointer; font-weight: 500; color: var(--secondary); transition: 0.3s; }
        .nav-links li:hover { color: var(--primary); }

        /* Main Container */
        .container { max-width: 850px; margin: 2rem auto; padding: 0 1rem; }
        .content-section { display: none; animation: fadeIn 0.4s ease; }
        .content-section.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* General Card Style */
        .card { background: white; padding: 2rem; border-radius: 12px; box-shadow: var(--card-shadow); text-align: center; }
        .btn-primary { background: var(--primary); color: white; border: none; padding: 0.8rem 2rem; border-radius: 25px; cursor: pointer; font-size: 1rem; margin-top: 1rem; }

        /* =========================================
           2. SECTION SPECIFIC STYLES
           ========================================= */
        
        /* Grammar & Flashcard Tiles */
        .tile-container { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 2rem; justify-content: center; }
        .tile { 
            background: white; border: 2px solid var(--primary); color: var(--primary);
            padding: 10px 20px; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.3s;
        }
        .tile.active { background: var(--primary); color: white; }
        .display-box { background: white; padding: 2rem; border-radius: 12px; box-shadow: var(--card-shadow); min-height: 200px; }
        .example-box { margin-top: 15px; padding: 15px; border-left: 4px solid var(--primary); background: #eef5ff; text-align: left; }

        /* Quiz Styles */
        .options-grid { display: grid; grid-template-columns: 1fr; gap: 10px; margin-top: 20px; }
        .option-btn { padding: 12px; border: 2px solid #ddd; border-radius: 8px; cursor: pointer; background: white; transition: 0.2s; }
        .correct { background-color: var(--success) !important; color: white; border-color: var(--success); }
        .wrong { background-color: var(--error) !important; color: white; border-color: var(--error); }
        .progress-bar { height: 8px; background: #eee; border-radius: 4px; margin-bottom: 20px; overflow: hidden; }
        #progress { height: 100%; background: var(--primary); width: 0%; transition: 0.3s; }

        /* Flashcard Flip Animation */
        .flashcard-container { perspective: 1000px; display: flex; flex-direction: column; align-items: center; }
        .flashcard { width: 320px; height: 220px; cursor: pointer; position: relative; transform-style: preserve-3d; transition: transform 0.6s; }
        .flashcard.flipped { transform: rotateY(180deg); }
        .card-front, .card-back { 
            position: absolute; width: 100%; height: 100%; backface-visibility: hidden; 
            display: flex; align-items: center; justify-content: center; 
            font-size: 2rem; border-radius: 15px; box-shadow: var(--card-shadow); 
        }
        .card-front { background: white; border: 1px solid #ddd; }
        .card-back { background: var(--primary); color: white; transform: rotateY(180deg); }
        .nav-controls { margin-top: 20px; display: flex; gap: 15px; align-items: center; }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="logo">🇩🇪 Deutsch<span>Lernen</span></div>
        <ul class="nav-links">
            <li onclick="showSection('home')">Home</li>
            <li onclick="showSection('grammar')">Grammar</li>
            <li onclick="showSection('practice')">Practice</li>
            <li onclick="showSection('flashcards')">Flashcards</li>
        </ul>
    </nav>

    <div class="container">
        
        <section id="home" class="content-section active">
            <div class="card">
                <h1>Willkommen!</h1>
                <p>Welcome to your German learning hub. Choose a section above to start.</p>
                <button class="btn-primary" onclick="showSection('grammar')">Get Started</button>
            </div>
        </section>

        <section id="grammar" class="content-section">
            <h2 style="text-align: center; margin-bottom: 1.5rem;">Grammar Topics</h2>
            <div id="grammar-tiles" class="tile-container">
                </div>
            <div id="grammar-display" class="display-box">
                <h3 id="g-title">Topic Title</h3>
                <p id="g-desc">Description</p>
                <div id="g-ex" class="example-box">Example</div>
            </div>
        </section>

        <section id="practice" class="content-section">
            <div class="card">
                <div class="progress-bar"><div id="progress"></div></div>
                <h3 id="question">Question?</h3>
                <div id="options" class="options-grid"></div>
                <p id="feedback" style="margin-top: 1rem; font-weight: bold;"></p>
                <button id="next-quiz" class="btn-primary" style="display:none;">Next Question</button>
            </div>
        </section>

        <section id="flashcards" class="content-section">
            <h2 style="text-align: center; margin-bottom: 1.5rem;">Vocabulary Training</h2>
            
            <div class="tile-container">
                <button class="tile active" onclick="setFlashcardRange(1, 50, this)">1-50</button>
                <button class="tile" onclick="setFlashcardRange(51, 100, this)">51-100</button>
                <button class="tile" onclick="setFlashcardRange(101, 150, this)">101-150</button>
                <button class="tile" onclick="setFlashcardRange(151, 200, this)">151-200</button>
            </div>

            <div class="flashcard-container">
                <div class="flashcard" id="flashcard" onclick="this.classList.toggle('flipped')">
                    <div class="card-front" id="card-de">German</div>
                    <div class="card-back" id="card-en">English</div>
                </div>
                <div class="nav-controls">
                    <button class="option-btn" onclick="prevCard()">←</button>
                    <span id="counter">1 / 0</span>
                    <button class="option-btn" onclick="nextCard()">→</button>
                </div>
            </div>
        </section>

    </div>

    <script>
        /* =========================================
           3. DATA (Edit & Add Content Here)
           ========================================= */

        // GRAMMAR TOPICS
        const grammarData = [
            { title: "Passiv", desc: "Focuses on the action rather than the doer.", ex: "Das Auto wird repariert." },
            { title: "Relativ", desc: "Clauses that provide more info about a noun.", ex: "Der Mann, der dort steht..." },
            { title: "Akkusativ", desc: "The direct object case.", ex: "Ich esse einen Apfel." },
            { title: "Dativ", desc: "The indirect object case.", ex: "Ich gebe dem Bruder ein Buch." }
        ];

        // QUIZ QUESTIONS
        const quizData = [
            { q: "Which article is used for Akkusativ Masculine?", o: ["Der", "Den", "Dem"], c: 1 },
            { q: "Translate 'The house is being built'", o: ["Das Haus baut", "Das Haus wird gebaut", "Das Haus ist bauen"], c: 1 }
        ];

        // FLASHCARDS (Up to 200 words)
        const allWords = [
            {d:"Hund", e:"Dog"}, {d:"Katze", e:"Cat"}, {d:"Apfel", e:"Apple"}, // 1-3
            // ... Add more words here. They will automatically sort into the tiles.
            ...Array(47).fill({d:"Word Placeholder", e:"English"}) // Dummy data to fill up ranges
        ];

        /* =========================================
           4. JAVASCRIPT LOGIC
           ========================================= */

        // --- GENERAL ---
        function showSection(id) {
            document.querySelectorAll('.content-section').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        // --- GRAMMAR TILES ---
        const gTileContainer = document.getElementById('grammar-tiles');
        function initGrammar() {
            gTileContainer.innerHTML = '';
            grammarData.forEach((item, index) => {
                const btn = document.createElement('button');
                btn.className = 'tile';
                btn.innerText = item.title;
                btn.onclick = () => {
                    document.querySelectorAll('#grammar-tiles .tile').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    document.getElementById('g-title').innerText = item.title;
                    document.getElementById('g-desc').innerText = item.desc;
                    document.getElementById('g-ex').innerText = "Example: " + item.ex;
                };
                gTileContainer.appendChild(btn);
            });
            gTileContainer.firstChild.click(); // Load first by default
        }

        // --- QUIZ LOGIC ---
        let qIdx = 0;
        function loadQuiz() {
            const data = quizData[qIdx];
            document.getElementById('question').innerText = data.q;
            const optDiv = document.getElementById('options');
            optDiv.innerHTML = '';
            document.getElementById('feedback').innerText = '';
            document.getElementById('next-quiz').style.display = 'none';

            data.o.forEach((opt, i) => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.innerText = opt;
                btn.onclick = () => {
                    if(i === data.c) {
                        btn.classList.add('correct');
                        document.getElementById('feedback').innerText = "Correct! ✅";
                    } else {
                        btn.classList.add('wrong');
                        document.getElementById('feedback').innerText = "Incorrect ❌";
                    }
                    document.getElementById('next-quiz').style.display = 'inline-block';
                };
                optDiv.appendChild(btn);
            });
            document.getElementById('progress').style.width = ((qIdx/quizData.length)*100) + '%';
        }

        document.getElementById('next-quiz').onclick = () => {
            qIdx++;
            if(qIdx < quizData.length) loadQuiz();
            else document.getElementById('practice').innerHTML = "<div class='card'><h2>Finished!</h2><button class='btn-primary' onclick='location.reload()'>Restart</button></div>";
        };

        // --- FLASHCARD RANGES ---
        let currentFilteredWords = [];
        let fIdx = 0;

        function setFlashcardRange(min, max, btn) {
            document.querySelectorAll('#flashcards .tile').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            
            currentFilteredWords = allWords.slice(min-1, max);
            fIdx = 0;
            updateCardDisplay();
        }

        function updateCardDisplay() {
            const card = document.getElementById('flashcard');
            card.classList.remove('flipped');
            setTimeout(() => {
                if(currentFilteredWords[fIdx]) {
                    document.getElementById('card-de').innerText = currentFilteredWords[fIdx].d;
                    document.getElementById('card-en').innerText = currentFilteredWords[fIdx].e;
                    document.getElementById('counter').innerText = `${fIdx + 1} / ${currentFilteredWords.length}`;
                }
            }, 150);
        }

        function nextCard() { fIdx = (fIdx + 1) % currentFilteredWords.length; updateCardDisplay(); }
        function prevCard() { fIdx = (fIdx - 1 + currentFilteredWords.length) % currentFilteredWords.length; updateCardDisplay(); }

        // --- INITIALIZE ---
        initGrammar();
        loadQuiz();
        setFlashcardRange(1, 50, document.querySelector('#flashcards .tile'));
    </script>
</body>
</html>
